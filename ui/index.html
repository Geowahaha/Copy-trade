<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CopyTrade Pro - Drag & Drop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0e13; color: #fff; min-height: 100vh; }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        header { background: #151a22; padding: 20px 30px; border-radius: 16px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, #00d4ff, #7b2fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .status-pill { padding: 8px 20px; border-radius: 24px; font-weight: 600; font-size: 14px; }
        .status-stopped { background: #ff4757; color: white; }
        .status-running { background: #2ed573; color: #0a0e13; }
        
        .main-area { display: grid; grid-template-columns: 280px 1fr 280px; gap: 24px; min-height: 70vh; }
        @media (max-width: 1024px) { .main-area { grid-template-columns: 1fr; } }
        
        .column { background: #151a22; border-radius: 20px; padding: 20px; }
        .column h2 { font-size: 16px; color: #6b7a8f; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #252d3a; }
        
        .drop-zone { min-height: 200px; border: 2px dashed #2a3444; border-radius: 16px; padding: 16px; transition: all 0.3s; }
        .drop-zone.drag-over { border-color: #00d4ff; background: rgba(0, 212, 255, 0.1); }
        
        .account-card { background: #1e2633; border-radius: 12px; padding: 14px; margin-bottom: 10px; cursor: grab; transition: all 0.2s; border: 1px solid #2a3444; }
        .account-card:hover { border-color: #00d4ff; transform: translateY(-2px); }
        .account-card.mt5 { border-left: 4px solid #27ae60; }
        .account-card.ctrader { border-left: 4px solid #e67e22; }
        .account-card.master { border-left: 4px solid #00d4ff; }
        
        .account-card .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .account-card .platform { font-size: 12px; font-weight: 700; padding: 4px 8px; border-radius: 6px; }
        .platform-mt5 { background: #27ae60; color: white; }
        .platform-ctrader { background: #e67e22; color: white; }
        
        .account-card .account-id { font-size: 14px; font-weight: 600; }
        .account-card .broker { font-size: 12px; color: #6b7a8f; }
        .account-card .balance { font-size: 16px; font-weight: 700; color: #2ed573; }
        
        .connection-line { height: 4px; background: linear-gradient(90deg, #00d4ff, #7b2fff); margin: 20px 0; position: relative; }
        .connection-line::after { content: '➜'; position: absolute; right: 10px; top: -14px; color: #7b2fff; font-size: 20px; }
        
        .btn-add { width: 100%; padding: 40px; border: 2px dashed #2a3444; border-radius: 16px; background: transparent; color: #6b7a8f; cursor: pointer; transition: all 0.3s; font-size: 16px; }
        .btn-add:hover { border-color: #00d4ff; color: #00d4ff; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background: #151a22; border-radius: 20px; padding: 30px; width: 420px; max-width: 90vw; }
        .modal-content h3 { margin-bottom: 20px; font-size: 20px; }
        
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 13px; color: #8b98a5; }
        .form-group input, .form-group select { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #2a3444; background: #0a0e13; color: #fff; font-size: 14px; }
        .form-group input:focus { outline: none; border-color: #00d4ff; }
        
        .btn { padding: 14px 28px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
        .btn-primary { background: #00d4ff; color: #0a0e13; }
        .btn-primary:hover { background: #00b8e6; }
        .btn-secondary { background: #2a3444; color: #fff; }
        .btn-close { background: #ff4757; color: white; }
        
        .btn-row { display: flex; gap: 12px; margin-top: 20px; }
        .btn-row .btn { flex: 1; }
        
        .connections-list { margin-top: 20px; }
        .connection-item { background: #1e2633; padding: 12px 16px; border-radius: 10px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
        .connection-item .arrow { color: #7b2fff; font-size: 18px; }
        
        .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-top: 20px; }
        .stat-box { background: #1e2633; padding: 20px; border-radius: 12px; text-align: center; }
        .stat-box .value { font-size: 28px; font-weight: 700; color: #00d4ff; }
        .stat-box .label { font-size: 12px; color: #6b7a8f; margin-top: 4px; }
        
        .alert { position: fixed; top: 20px; right: 20px; padding: 16px 24px; border-radius: 12px; font-weight: 600; z-index: 2000; transform: translateX(400px); transition: transform 0.3s; }
        .alert.show { transform: translateX(0); }
        .alert-success { background: #2ed573; color: #0a0e13; }
        .alert-error { background: #ff4757; color: white; }
        
        .running-indicator { display: none; }
        .running-indicator.show { display: flex; align-items: center; gap: 8px; }
        .pulse { width: 10px; height: 10px; background: #2ed573; border-radius: 50%; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div class="alert" id="alert"></div>
    
    <div class="container">
        <header>
            <h1>CopyTrade Pro</h1>
            <div style="display: flex; align-items: center; gap: 20px;">
                <div class="running-indicator" id="runningIndicator">
                    <div class="pulse"></div>
                    <span>COPING</span>
                </div>
                <span class="status-pill status-stopped" id="statusPill">STOPPED</span>
            </div>
        </header>
        
        <div class="main-area">
            <div class="column">
                <h2>📥 Master Account</h2>
                <div class="drop-zone" id="masterZone" ondragover="dragOver(event)" ondrop="dropMaster(event)">
                    <button class="btn-add" onclick="showAddModal('master')">+ Add Master Account</button>
                </div>
                <div id="masterCard"></div>
            </div>
            
            <div class="column" style="background: linear-gradient(180deg, #151a22 0%, #1a1528 100%);">
                <h2>🔄 Copy Engine</h2>
                <div style="text-align: center; padding: 40px;">
                    <div class="connection-line"></div>
                </div>
                <div class="connections-list" id="connectionsList"></div>
                
                <div style="margin-top: auto;">
                    <div class="stats-bar">
                        <div class="stat-box">
                            <div class="value" id="positionsCount">0</div>
                            <div class="label">Positions</div>
                        </div>
                        <div class="stat-box">
                            <div class="value" id="latencyAvg">0ms</div>
                            <div class="label">Latency</div>
                        </div>
                        <div class="stat-box">
                            <div class="value" id="totalTrades">0</div>
                            <div class="label">Trades</div>
                        </div>
                        <div class="stat-box">
                            <div class="value" id="copyRate">0%</div>
                            <div class="label">Success</div>
                        </div>
                    </div>
                    
                    <div style="display: flex; gap: 12px; margin-top: 24px;">
                        <button class="btn btn-primary" style="flex: 1; padding: 18px;" onclick="startCopying()" id="startBtn">▶ Start Copying</button>
                        <button class="btn btn-close" style="flex: 1;" onclick="stopCopying()" id="stopBtn" disabled>■ Stop</button>
                    </div>
                </div>
            </div>
            
            <div class="column">
                <h2>📤 Slave Accounts</h2>
                <div class="drop-zone" id="slaveZone" ondragover="dragOver(event)" ondrop="dropSlave(event)">
                    <button class="btn-add" onclick="showAddModal('slave')">+ Add Slave Account</button>
                </div>
                <div id="slaveCards"></div>
            </div>
        </div>
    </div>
    
    <!-- Add Account Modal -->
    <div class="modal" id="addModal">
        <div class="modal-content">
            <h3 id="modalTitle">Add Account</h3>
            <div class="form-group">
                <label>Platform</label>
                <select id="accountPlatform" onchange="platformChanged()">
                    <option value="mt5">MetaTrader 5</option>
                    <option value="ctrader">cTrader</option>
                </select>
            </div>
            
            <div id="mt5Fields">
                <div class="form-group">
                    <label>Login</label>
                    <input type="number" id="accountLogin" placeholder="123456">
                </div>
                <div class="form-group">
                    <label>Server</label>
                    <input type="text" id="accountServer" placeholder="ICMarkets-SC">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="accountPassword" placeholder="Your password">
                </div>
            </div>
            
            <div id="ctraderFields" style="display: none;">
                <div class="form-group">
                    <label>Access Token</label>
                    <input type="text" id="accountToken" placeholder="Paste cTrader access token">
                </div>
                <button type="button" class="btn btn-secondary" style="width: 100%; margin-bottom: 12px;" onclick="fetchAccounts()">🔍 Fetch My Accounts</button>
                <div class="form-group" id="accountsDropdown" style="display: none;">
                    <label>Select Account</label>
                    <select id="accountSelect"></select>
                </div>
            </div>
            
            <div class="form-group">
                <label>Account Name (optional)</label>
                <input type="text" id="accountName" placeholder="My Trading Account">
            </div>
            
            <div class="btn-row">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveAccount()">Save Account</button>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:8000';
        let accounts = [];
        let masterAccount = null;
        let slaveAccounts = [];
        let running = false;
        let addMode = 'slave';
        
        function showAlert(msg, type = 'success') {
            const alert = document.getElementById('alert');
            alert.textContent = msg;
            alert.className = 'alert alert-' + type + ' show';
            setTimeout(() => alert.classList.remove('show'), 3000);
        }
        
        function showAddModal(mode) {
            addMode = mode;
            document.getElementById('modalTitle').textContent = mode === 'master' ? 'Add Master Account' : 'Add Slave Account';
            document.getElementById('addModal').classList.add('show');
        }
        
        function closeModal() {
            document.getElementById('addModal').classList.remove('show');
        }
        
        function platformChanged() {
            const platform = document.getElementById('accountPlatform').value;
            document.getElementById('mt5Fields').style.display = platform === 'mt5' ? 'block' : 'none';
            document.getElementById('ctraderFields').style.display = platform === 'ctrader' ? 'block' : 'none';
        }
        
        async function fetchAccounts() {
            const token = document.getElementById('accountToken').value;
            if (!token) { showAlert('Please enter access token', 'error'); return; }
            
            try {
                const res = await fetch(API + '/api/ctrader/accounts?token=' + encodeURIComponent(token));
                const data = await res.json();
                
                if (data.accounts && data.accounts.length > 0) {
                    const select = document.getElementById('accountSelect');
                    select.innerHTML = data.accounts.map(a => 
                        `<option value="${a.accountId}">${a.accountNumber} - ${a.brokerName} (${a.depositCurrency}) ${a.balance > 0 ? '$' + a.balance.toFixed(0) : ''}</option>`
                    ).join('');
                    document.getElementById('accountsDropdown').style.display = 'block';
                    showAlert('Found ' + data.accounts.length + ' accounts!');
                } else {
                    showAlert('No accounts found', 'error');
                }
            } catch(e) {
                showAlert('Failed to fetch accounts', 'error');
            }
        }
        
        async function saveAccount() {
            const platform = document.getElementById('accountPlatform').value;
            const login = document.getElementById('accountLogin').value;
            const server = document.getElementById('accountServer').value;
            const password = document.getElementById('accountPassword').value;
            const token = document.getElementById('accountToken').value;
            const accountId = document.getElementById('accountSelect').value;
            const name = document.getElementById('accountName').value || (login || accountId);
            
            const account = {
                id: Date.now(),
                platform,
                login: login || accountId,
                server,
                password,
                access_token: token,
                account_id: accountId,
                name: name
            };
            
            try {
                const data = {
                    platform,
                    login: account.login,
                    server,
                    password,
                    access_token: token,
                    account_id: accountId
                };
                
                if (addMode === 'master') {
                    await fetch(API + '/api/connect', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(data)
                    });
                    masterAccount = account;
                    renderMaster();
                } else {
                    await fetch(API + '/api/slave/add', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(data)
                    });
                    slaveAccounts.push(account);
                    renderSlaves();
                }
                
                showAlert(addMode === 'master' ? 'Master connected!' : 'Slave added!');
                closeModal();
            } catch(e) {
                showAlert('Failed to connect', 'error');
            }
        }
        
        function renderMaster() {
            const zone = document.getElementById('masterZone');
            if (masterAccount) {
                const p = masterAccount.platform;
                zone.innerHTML = `
                    <div class="account-card master" draggable="true" ondragstart="dragStart(event, 'master')">
                        <div class="header">
                            <span class="platform platform-${p}">${p.toUpperCase()}</span>
                            <span style="font-size: 20px;">👑</span>
                        </div>
                        <div class="account-id">${masterAccount.name || masterAccount.login}</div>
                        <div class="broker">${masterAccount.server || 'Connected'}</div>
                    </div>
                `;
            } else {
                zone.innerHTML = '<button class="btn-add" onclick="showAddModal(\'master\')">+ Add Master Account</button>';
            }
        }
        
        function renderSlaves() {
            const container = document.getElementById('slaveCards');
            container.innerHTML = slaveAccounts.map((a, i) => `
                <div class="account-card ${a.platform}" draggable="true" ondragstart="dragStart(event, 'slave', ${i})" onclick="removeSlave(${i})" title="Click to remove">
                    <div class="header">
                        <span class="platform platform-${a.platform}">${a.platform.toUpperCase()}</span>
                        <span style="color: #ff4757;">✕</span>
                    </div>
                    <div class="account-id">${a.name || a.login}</div>
                    <div class="broker">${a.server || 'Connected'}</div>
                </div>
            `).join('');
            
            if (slaveAccounts.length === 0) {
                document.getElementById('slaveZone').innerHTML = '<button class="btn-add" onclick="showAddModal(\'slave\')">+ Add Slave Account</button>';
            }
        }
        
        function dragStart(e, mode, index) {
            e.dataTransfer.setData('mode', mode);
            e.dataTransfer.setData('index', index);
        }
        
        function dragOver(e) {
            e.preventDefault();
            e.target.closest('.drop-zone')?.classList.add('drag-over');
        }
        
        function dropMaster(e) {
            e.preventDefault();
            document.getElementById('masterZone').classList.remove('drag-over');
        }
        
        function dropSlave(e) {
            e.preventDefault();
            document.getElementById('slaveZone').classList.remove('drag-over');
        }
        
        function removeSlave(index) {
            if (confirm('Remove this slave account?')) {
                slaveAccounts.splice(index, 1);
                renderSlaves();
            }
        }
        
        async function startCopying() {
            if (!masterAccount) { showAlert('Please add master account first', 'error'); return; }
            if (slaveAccounts.length === 0) { showAlert('Please add at least one slave', 'error'); return; }
            
            await fetch(API + '/api/start', { method: 'POST' });
            running = true;
            
            document.getElementById('statusPill').className = 'status-pill status-running';
            document.getElementById('statusPill').textContent = 'RUNNING';
            document.getElementById('runningIndicator').classList.add('show');
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            
            showAlert('Copying started!');
            startRefresh();
        }
        
        async function stopCopying() {
            await fetch(API + '/api/stop', { method: 'POST' });
            running = false;
            
            document.getElementById('statusPill').className = 'status-pill status-stopped';
            document.getElementById('statusPill').textContent = 'STOPPED';
            document.getElementById('runningIndicator').classList.remove('show');
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
        }
        
        function startRefresh() {
            setInterval(async () => {
                if (!running) return;
                try {
                    const res = await fetch(API + '/api/status');
                    const data = await res.json();
                    
                    document.getElementById('positionsCount').textContent = data.positions || 0;
                    if (data.latency) {
                        document.getElementById('latencyAvg').textContent = Math.round(data.latency.avg) + 'ms';
                    }
                } catch(e) {}
            }, 1000);
        }
        
        loadAccounts();
        async function loadAccounts() {
            try {
                const res = await fetch(API + '/api/settings');
                const data = await res.json();
                
                if (data.master) {
                    masterAccount = { ...data.master, id: 1 };
                    renderMaster();
                }
                
                if (data.slaves && data.slaves.length > 0) {
                    slaveAccounts = data.slaves.map((s, i) => ({ ...s, id: i + 2 }));
                    renderSlaves();
                }
            } catch(e) {}
        }
    </script>
</body>
</html>
